<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de Derivadas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      transition: background 0.3s, color 0.3s;
    }
    header {
      background: #4a90e2;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    main {
      padding: 1.5rem;
      max-width: 900px;
      margin: auto;
    }
    h2 {
      color: #4a90e2;
    }
    section {
      background: #fff;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 0.5rem;
      margin: 0.3rem 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #4a90e2;
      color: white;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background: #357ab8;
    }
    .resultado {
      margin-top: 1rem;
      font-weight: bold;
    }

    /* Modo oscuro */
    body.dark {
      background: #121212;
      color: #eee;
    }
    body.dark section {
      background: #1e1e1e;
      color: #eee;
      box-shadow: 0 2px 5px rgba(255,255,255,0.1);
    }
    body.dark h2 {
      color: #90caf9;
    }
    body.dark button {
      background: #90caf9;
      color: #121212;
    }
  </style>
